# ===========================
# PhDMentor.org — Site Config
# ===========================

# --- Theme ---
remote_theme: "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin: "default"   # we override colors ourselves in assets/css/main.scss

# --- Homepage behavior ---
show_blog_on_home: true   # set to false to hide the "From the Blog" homepage section

# --- Site basics ---
title: "PhD Mentor"
title_separator: "-"
name: "Meirav Segal"                       # TODO: replace with your real name
description: "One-on-one coaching and mentoring for CS PhD students navigating advising, research skills, and academic life."
url: "https://phdmentor.org"
baseurl: ""
locale: "en-US"

# --- Author (shown in sidebar) ---
author:
  name: "Meirav Segal"                     # TODO
  avatar: "/assets/images/mypic.jpg"
  bio: "Postdoc in Computer Science. I help CS PhD students build research skills, navigate advisor relationships, and feel less alone in grad school."
  location: "Zurich, Switzerland"
  links:
   # - label: "Book a Free Session"
   #   icon: "fas fa-fw fa-calendar"
   #   url: "/book/"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:meirav@phdmentor.org"    # TODO: replace with your real contact email
    - label: "Research profile"
      icon: "fas fa-graduation-cap"
      url: "https://meiravsegal.com"
      target: "_blank"
    # - label: "LinkedIn"
    #   icon: "fab fa-fw fa-linkedin"
    #   url: "https://linkedin.com/in/yourprofile"

footer:
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:meirav@phdmentor.org"

atom_feed:
  hide: true

# --- Build settings ---
markdown: kramdown
highlighter: rouge
permalink: /blog/:title/
paginate: 6
paginate_path: /blog/page:num/
timezone: America/New_York             # TODO: adjust to your timezone

include:
  - _pages

collections:
  pages:
    output: true
    permalink: /:path/

defaults:
  # _pages defaults — these are your static, non-blog pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false
  # _posts defaults — these are your blog posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: true
      related: true
      show_teaser: true
  # homepage
  - scope:
      path: "index.md"
    values:
      layout: splash

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

# --- SEO / social ---
twitter:
  username: ""
og_image: "/assets/images/avatar-placeholder.svg"
social:
  type: "Person"
  name: "Your Name"

# --- Compose settings ---
compress_html:
  clippings: all
  ignore:
    envs: development
